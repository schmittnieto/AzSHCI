name: Copy Files to Blog Repository

on:
  push:
    branches:
      - main

jobs:
  copy-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Checkout Destination Repository
        uses: actions/checkout@v4
        with:
          repository: schmittnieto/schmittnieto.github.io
          token: ${{ secrets.GH_PAT }}
          path: blog_destination

      - name: Purge Camo Images
        uses: kevincobain2000/action-camo-purge@v1

      - name: Copy Files (mirror)
        run: |
          SOURCE_DIR="${{ github.workspace }}"
          DEST_DIR="${{ github.workspace }}/blog_destination/assets/repo/AzSHCI"
          mkdir -p "$DEST_DIR"
          # --delete makes this a true mirror: files removed or renamed in the
          # source are also removed from the destination (e.g. stale 02.1_Cluster.ps1).
          rsync -av --delete \
            --exclude='.git' \
            --exclude='blog_destination' \
            "$SOURCE_DIR/" "$DEST_DIR/"

      - name: Commit and Push Changes
        working-directory: blog_destination
        run: |
          git config user.name "schmittnieto"
          git config user.email "cristian@schmitt-nieto.com"
          # Force-add the mirrored subtree. The blog repo .gitignore has a broad
          # "scripts/" rule that would otherwise skip new files under
          # assets/repo/AzSHCI/scripts/ (for example .env.example and Set-LabEnv.ps1).
          # --all also stages the deletions produced by the rsync --delete mirror.
          git add --all --force -- assets/repo/AzSHCI
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Update files from AzSHCI repository"
            git push origin main
          fi
